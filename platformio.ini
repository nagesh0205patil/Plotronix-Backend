[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
monitor_speed = 9600
monitor_port = COM5
upload_port = COM5
upload_speed = 57600

; Include directories for libraries and custom headers
; Use `lib_extra_dirs` when adding custom library directories
lib_extra_dirs =
    .

; Arduino Nano (ATmega328P) specifications
board_build.f_cpu = 16000000L
board_build.vid = 0x2341
board_build.pid = 0x0043

; Libraries required
lib_deps = 
    adafruit/Adafruit GFX Library@^1.12.6
    adafruit/Adafruit ST7735 and ST7789 Library@^1.11.0
    adafruit/Adafruit BusIO@^1.17.4

; Build options
build_flags = 
    -DARDUINO_AVR_NANO
    -DARDUINO=10808
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -flto
    -fno-exceptions
    -fno-rtti

; Serial monitor settings
monitor_echo = yes
monitor_eol = CRLF
